name: Deploy

on:
  push:
    branches: [master]

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  infra:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      container_app_name: ${{ steps.tf-outputs.outputs.container_app_name }}
      resource_group: ${{ steps.tf-outputs.outputs.resource_group }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init
        working-directory: infrastructure/environments/dev

      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: infrastructure/environments/dev

      - name: Capture Terraform outputs
        id: tf-outputs
        run: |
          echo "container_app_name=$(terraform output -raw container_app_name)" >> $GITHUB_OUTPUT
          echo "resource_group=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT
        working-directory: infrastructure/environments/dev

  app:
    name: Build & deploy app
    runs-on: ubuntu-latest
    needs: infra
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build -t $REGISTRY/snipurl:${{ github.sha }} ./app
          docker push $REGISTRY/snipurl:${{ github.sha }}

      - name: Deploy to Container Apps (rolling update)
        run: |
          az containerapp update \
            --name ${{ needs.infra.outputs.container_app_name }} \
            --resource-group ${{ needs.infra.outputs.resource_group }} \
            --image $REGISTRY/snipurl:${{ github.sha }}
